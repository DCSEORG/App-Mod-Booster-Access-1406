<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Quote - Swinton Go! Insurance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-step="4">

    <!-- Header -->
    <header class="page-header">
        <div class="page-header__wrapper">
            <a href="index.html" class="page-header__logo" aria-label="Swinton Go! Insurance home">
                <img src="images/logo.png" alt="Swinton Go! Insurance">
            </a>
            <nav class="progress-nav" aria-label="Quote progress">
                <div class="progress-step progress-step--done">
                    <div class="progress-step__dot"></div>
                    <div class="progress-step__line"></div>
                    <span class="progress-step__label">Your details</span>
                </div>
                <div class="progress-step progress-step--done">
                    <div class="progress-step__dot"></div>
                    <div class="progress-step__line"></div>
                    <span class="progress-step__label">Your car</span>
                </div>
                <div class="progress-step progress-step--done">
                    <div class="progress-step__dot"></div>
                    <div class="progress-step__line"></div>
                    <span class="progress-step__label">Your cover</span>
                </div>
                <div class="progress-step progress-step--active">
                    <div class="progress-step__dot"></div>
                    <span class="progress-step__label">Quote</span>
                </div>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <div id="quote-output" class="page-section">
            <!-- Quote is dynamically generated by JS -->
            <div class="loading-overlay">
                <div class="spinner"></div>
                <p style="color:var(--text-muted);font-size:15px;">Calculating your quote&hellip;</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer__inner">
            <div>
                <div class="footer__copy">&copy; <span id="footer-year"></span> <strong>Swinton Go!</strong> All rights reserved</div>
                <div class="footer__links">
                    <a href="#">Important info</a>
                    <span class="sep">/</span>
                    <a href="#">Privacy policy <span class="footer__ext-icon">&#x2197;</span></a>
                    <span class="sep">/</span>
                    <a href="#">Cookie policy <span class="footer__ext-icon">&#x2197;</span></a>
                    <span class="sep">/</span>
                    <a href="#">Contact us</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {

        var data = {
            title:            Store.get('title')            || '',
            firstName:        Store.get('firstName')        || '',
            lastName:         Store.get('lastName')         || '',
            dob:              Store.get('dob')              || '',
            registration:     Store.get('registration')     || '',
            vehicle:          Store.get('vehicle')          || {},
            purchaseDate:     Store.get('purchaseDate')     || '',
            carOwner:         Store.get('carOwner')         || '',
            carUse:           Store.get('carUse')           || '',
            annualMileage:    Store.get('annualMileage')    || '0',
            overnightParking: Store.get('overnightParking') || '',
            modifications:    Store.get('modifications')    || 'no',
            licenceType:      Store.get('licenceType')      || 'full-uk',
            licenceYears:     Store.get('licenceYears')     || '0',
            ncbYears:         Store.get('ncbYears')         || '0',
            claimsCount:      Store.get('claimsCount')      || 0,
            convictionsCount: Store.get('convictionsCount') || 0,
            coverType:        Store.get('coverType')        || 'comprehensive',
            startDate:        Store.get('startDate')        || '',
            voluntaryExcess:  Store.get('voluntaryExcess')  || '250',
            paymentMethod:    Store.get('paymentMethod')    || 'monthly'
        };

        // Parse DOB for calculateQuote
        if (data.dob) {
            var parts = data.dob.split('/');
            if (parts.length === 3) {
                data.dob = new Date(+parts[2], +parts[1] - 1, +parts[0]).toISOString();
            }
        }

        var prices = calculateQuote(data);

        // ── Formatters ────────────────────────────────────────
        function fmtCover(v) {
            return { tpo: 'Third Party Only', tpft: 'Third Party Fire & Theft', comprehensive: 'Comprehensive' }[v] || v;
        }
        function fmtDate(isoStr) {
            var d = new Date(isoStr + 'T00:00:00');
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        function fmtMileage(v) {
            var n = parseInt(v, 10);
            if (n >= 50001) return '50,000+ miles';
            return n.toLocaleString('en-GB') + ' miles';
        }
        function fmtParking(v) {
            return { garage: 'Locked garage', driveway: 'Driveway at home', street: 'Street near home', carpark: 'Car park', other: 'Other' }[v] || v;
        }
        function fmtLicence(v) {
            return { 'full-uk': 'Full UK licence', 'prov-uk': 'Provisional UK licence', eu: 'European Union licence', intl: 'International licence' }[v] || v;
        }
        function fmtTitle(v) {
            return { MR: 'Mr', MRS: 'Mrs', MS: 'Ms', MISS: 'Miss', MX: 'Mx', DR: 'Dr' }[v] || v;
        }
        function fmtExcess(v) { return '&pound;' + parseInt(v, 10).toLocaleString('en-GB'); }

        var veh = data.vehicle;
        var vehLabel = veh && veh.make
            ? (veh.make + ' ' + veh.model + (veh.variant ? ' ' + veh.variant : ''))
            : '&mdash;';
        var refNum = 'SG-' + Math.floor(10000000 + Math.random() * 90000000);
        var coverLabel = fmtCover(data.coverType);

        var monthlyFmt = prices.monthly.toFixed(2);
        var annualFmt  = prices.annual.toLocaleString('en-GB');

        // ── Build HTML ────────────────────────────────────────
        var html = '';

        // Quote hero
        html += '<div class="quote-hero">';
        html += '<div class="quote-hero__label">Your ' + coverLabel + ' Car Insurance quote</div>';
        html += '<div class="quote-hero__price-monthly"><sup>&pound;</sup>' + monthlyFmt + ' <small style="font-size:24px;font-weight:400;">/month</small></div>';
        html += '<div class="quote-hero__or">or pay annually and save</div>';
        html += '<div class="quote-hero__price-annual">&pound;' + annualFmt + ' per year</div>';
        html += '<div class="quote-hero__actions">';
        html += '<button class="btn btn--primary btn--large" onclick="alert(\'Demo only \u2013 no actual purchase made\')">Buy now &ndash; &pound;' + monthlyFmt + '/month</button>';
        html += '<button class="btn" style="background:transparent;border:2px solid rgba(255,255,255,0.6);color:#fff;padding:18px 40px;font-size:18px;font-weight:700;border-radius:4px;" onclick="alert(\'Demo only \u2013 no actual purchase made\')">Pay annually &ndash; &pound;' + annualFmt + '</button>';
        html += '</div>';
        html += '</div>';

        // Summary cards
        html += '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:24px;">';

        // Cover summary
        html += '<div style="flex:1;min-width:260px;background:#fff;border-radius:4px;padding:24px 28px;box-shadow:0 1px 4px rgba(13,56,128,0.1);">';
        html += '<h2 class="card__title" style="font-size:18px;margin-bottom:16px;">Your cover summary</h2>';
        html += '<table class="summary-list"><tbody>';
        html += '<tr><td>Cover type</td><td>' + coverLabel + '</td></tr>';
        html += '<tr><td>Start date</td><td>' + (data.startDate ? fmtDate(data.startDate) : '&mdash;') + '</td></tr>';
        html += '<tr><td>Voluntary excess</td><td>' + fmtExcess(data.voluntaryExcess) + '</td></tr>';
        html += '<tr><td>Annual mileage</td><td>' + fmtMileage(data.annualMileage) + '</td></tr>';
        html += '<tr><td>Overnight parking</td><td>' + fmtParking(data.overnightParking) + '</td></tr>';
        html += '<tr><td>Vehicle</td><td>' + vehLabel + '</td></tr>';
        html += '</tbody></table></div>';

        // Driver summary
        html += '<div style="flex:1;min-width:260px;background:#fff;border-radius:4px;padding:24px 28px;box-shadow:0 1px 4px rgba(13,56,128,0.1);">';
        html += '<h2 class="card__title" style="font-size:18px;margin-bottom:16px;">Your details summary</h2>';
        html += '<table class="summary-list"><tbody>';
        html += '<tr><td>Name</td><td>' + fmtTitle(data.title) + ' ' + data.firstName + ' ' + data.lastName + '</td></tr>';
        html += '<tr><td>Date of birth</td><td>' + (Store.get('dob') || '&mdash;') + '</td></tr>';
        html += '<tr><td>Driving licence</td><td>' + fmtLicence(data.licenceType) + '</td></tr>';
        html += '<tr><td>Years NCB</td><td>' + (data.ncbYears === '9' ? '9+' : data.ncbYears) + ' years</td></tr>';
        html += '<tr><td>Claims</td><td>' + (+data.claimsCount === 0 ? 'None' : data.claimsCount) + '</td></tr>';
        html += '<tr><td>Convictions</td><td>' + (+data.convictionsCount === 0 ? 'None' : data.convictionsCount) + '</td></tr>';
        html += '</tbody></table></div>';

        html += '</div>';

        // Reference
        html += '<div class="info-box" style="margin-top:24px;">';
        html += '<span>&#10003;</span>';
        html += '<span>This quote is valid for 30 days. Your reference number is <strong>' + refNum + '</strong>.</span>';
        html += '</div>';

        // Start again
        html += '<p style="text-align:center;margin-top:28px;">';
        html += '<a href="index.html" class="btn btn--ghost" onclick="Store.clear();">&#8592; Start again</a>';
        html += '</p>';

        document.getElementById('quote-output').innerHTML = html;
    });
    </script>
</body>
</html>
